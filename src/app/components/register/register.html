<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <!-- Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <header>
        <nav class="nav-menu">
            <a href="index.html" class="logoAvisame" id="logoAvisame">Avisame</a>
            <ul class="nav-links">
                <li><a href="index.html">Login</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">

        <div class="content">

            <h1>Criar Conta</h1>

            <form action="" method="post" id="form-register">

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>

                <button type="submit" id="btn-register">Enviar</button>

                <p> Já tenho uma conta? <a href="index.html">Faça login</a> </p>

            </form>

        </div>
    </div>

    <footer id="footer">

        <div class="footer-midias-links">
            <ul>
                <li><a href="https://www.linkedin.com/in/hudisson-xavier" target="_blank"><i
                            class="fa-brands fa-linkedin"></i></a></li>
                <li><a href="https://github.com/hudisson" target="_blank"><i class="fa-brands fa-github"></i></a></li>
                <!-- <li><a href="#">Blog</a></li> -->
            </ul>
        </div>

        <p>&copy; 2026 Avisame. Todos os direitos resevados</p>

    </footer>

</body>

</html>
